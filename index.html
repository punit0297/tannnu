<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Bestu ✨</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>

    <div class="bg-stars" id="star-field"></div>
    <div class="floating-bubbles" id="bubbles"></div>

    <audio id="birthdaySong" loop>
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <div id="landing-screen" class="screen">
        <div class="center-content">
            <lottie-player src="https://assets1.lottiefiles.com/packages/lf20_st458v9v.json" background="transparent" speed="1" style="width: 300px; height: 300px;" loop autoplay></lottie-player>
            <h2 class="glow-msg">Taiyaar ho, Bestu? ✨</h2>
            <button id="activate-btn">Magic Shuru Karo!</button>
        </div>
    </div>

    <main id="main-content" class="hidden">
        
        <button id="mute-btn">🔊</button>

        <section class="full-page">
            <div class="hero-card reveal">
                <h1 class="neon-title">Happy Birthday, <br><span class="bestu-name">Bestu!</span> 🎉</h1>
                <lottie-player src="https://assets5.lottiefiles.com/packages/lf20_u4yrau.json" background="transparent" speed="1" style="width: 200px; height: 200px;" loop autoplay></lottie-player>
            </div>
        </section>

        <section class="full-page">
            <div class="glass-card reveal">
                <h3 class="message-header">Ek Choti si Baat...</h3>
                <p id="type-msg"></p>
                <span class="blink">_</span>
            </div>
        </section>

        <section class="full-page">
            <div class="magic-jar reveal">
                <div class="orb"></div>
                <h2 class="jar-text">Hamari Dosti <br><span>Sabse Alag Hai!</span></h2>
                <lottie-player src="https://assets9.lottiefiles.com/packages/lf20_i9mxcD.json" background="transparent" speed="1" style="width: 100px; height: 100px;" loop autoplay></lottie-player>
            </div>
        </section>

        <section class="full-page">
            <div class="final-reveal reveal">
                <lottie-player src="https://assets1.lottiefiles.com/packages/lf20_kyu7xb1v.json" background="transparent" speed="1" style="width: 300px; height: 300px;" loop autoplay></lottie-player>
                <h2 class="dm-text">Aapka Asli Gift...</h2>
                <button id="dm-btn">Kahan Hai Gift? 🤔</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
